# cronlog example configuration
# Copy to /etc/cronlog/cronlog.yaml or pass via --config.

job_name: "my-job"

log_dir: "/var/log/cronlog"
max_files: 7

# Structured JSON log level (info | error)
log_level: "info"

# Webhook URL for failure notifications (leave blank to disable)
notify_url: ""

# Heartbeat URL pinged on completion (leave blank to disable)
heartbeat_url: ""

# Watchdog: alert when job has not succeeded within this duration.
# Uses Go duration syntax: 25h, 90m, etc. Set to 0 to disable.
watchdog_interval: "25h"

# Retry failed jobs up to this many additional attempts.
retry_max_attempts: 0
retry_delay: "5s"

# Throttle: minimum gap between successive runs.
throttle_interval: "0s"

# Output truncation limit in bytes (0 = unlimited).
truncate_bytes: 0

# Suppress lines matching these patterns (literal or regex).
filter_patterns: []

# Redact sensitive values from output.
redact_literals: []
redact_patterns: []
